<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notatki - Muzykologia UAM</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h1 class="logo">Notatki</h1>
            <span class="subtitle">Muzykologia UAM</span>
        </div>
    </header>

    <div class="notes-container">
        <aside class="notes-sidebar">
            <h3>📚 Notatki</h3>
            <ul class="folder-tree" id="folderTree">
                <li class="loading">Ładowanie...</li>
            </ul>
        </aside>

        <main class="notes-content">
            <div id="noteContent">
                <div class="note-header">
                    <h1>Przeglądaj notatki</h1>
                    <p class="note-meta">Wybierz notatkę z menu po lewej stronie</p>
                </div>
                <div class="markdown-content">
                    <p>Witaj! Wybierz plik z menu aby go wyświetlić.</p>
                    <p>Wszystkie notatki są automatycznie synchronizowane z Obsidian.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="notes.js"></script>
</body>
</html>
